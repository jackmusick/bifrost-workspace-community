    description: Remove a time entry from the timesheet by zeroing out its duration.
      The underlying action (note, email, etc.) is preserved but will no longer count
      toward the timesheet. Use this to clean up duplicate entries, accidental time
      logs, or test entries without losing the audit trail. The calling agent is resolved
      automatically.
    function_name: adjust_time_entry
