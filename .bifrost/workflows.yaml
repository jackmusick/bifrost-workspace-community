  eaf7753a-bdea-4221-9745-f195c4d06e72:
    description: 'Fill a timesheet by executing a confirmed day plan in one shot.
      Takes an array of time blocks, each specifying what to log. Handles work entries
      (via QuickTime), break/lunch entries, appointment completions, and time adjustments
      to existing entries. Call reconstruct_day first to build the plan, confirm it
      with the user, then pass the confirmed blocks here.


      Each block needs: action (one of ''log'', ''break'', ''lunch'', ''complete'',
      ''adjust''), start, end, and note. Optional fields: client_id (for client-facing
      work), appointment_id (for ''complete'' action), action_id + ticket_id (for
      ''adjust'' action).


      The calling agent is resolved automatically.'
    function_name: fill_day
    id: eaf7753a-bdea-4221-9745-f195c4d06e72
    name: fill_day
    path: shared/halopsa/tools/fill_day.py
    type: tool
  eb1b9114-5826-4f6d-9c4f-015fbc8808e7:
    description: Log a QuickTime entry. Creates a lightweight time entry that auto-creates
      and closes a ticket behind the scenes. Use for time accountability on quick
      calls, one-off meetings, QBRs, internal work, or anything that isn't a service
      ticket the team needs to reference. Optionally tie to a specific client. Does
      NOT create a visible service ticket.
    function_name: log_quicktime
    id: eb1b9114-5826-4f6d-9c4f-015fbc8808e7
    name: log_quicktime
    path: shared/halopsa/tools/timeentry.py
    type: tool
  ec165a28-94ef-4fef-9779-e32c1ce48979:
